<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pitchside, live match companion</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#E40521">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#E40521;
    --brand-ink:#ffffff;
    --bg:#0A0D10;
    --surface:#12171C;
    --surface-2:#181E24;
    --surface-3:#1F262D;
    --line:#262F38;
    --text:#F2F5F7;
    --muted:#8B95A0;
    --yellow:#F5C518;
    --red:#E4051F;
    --green:#2FBF6B;
    --pitch:#13502E;
    --pitch-2:#11472A;
    --pitch-line:rgba(255,255,255,.55);

    --font-display:"Archivo", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
    --font-mono:"DM Mono", ui-monospace, monospace;

    --r:14px;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font-body);
    background:
      radial-gradient(130% 60% at 50% -10%, #161d24 0%, var(--bg) 55%) fixed,
      var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:16px 14px 40px;
  }

  .app{width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px}

  /* Masthead */
  .mast{display:flex;align-items:center;justify-content:space-between}
  .wordmark{
    font-family:var(--font-display);font-weight:800;letter-spacing:-0.02em;
    font-size:23px;line-height:1;display:flex;align-items:center;gap:8px;
  }
  .wordmark .mark{
    width:22px;height:22px;border-radius:6px;background:var(--brand);
    display:grid;place-items:center;
  }
  .wordmark .mark svg{width:14px;height:14px;display:block}
  .wordmark .side{color:var(--brand)}
  .tag{font-size:11px;color:var(--muted);letter-spacing:0.02em;text-align:right}

  /* Mode switch */
  .modes{
    display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:4px;
  }
  .mode{
    flex:1;appearance:none;border:0;background:transparent;color:var(--muted);
    font-family:var(--font-body);font-weight:600;font-size:12px;letter-spacing:0.02em;
    padding:8px;border-radius:8px;cursor:pointer;transition:color .12s ease, background .12s ease;
  }
  .mode:hover{color:var(--text)}
  .mode.sel{background:var(--brand);color:var(--brand-ink)}
  .mode:focus-visible{outline:3px solid #5b8cff;outline-offset:2px}

  /* Match header */
  .matchcard{
    background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;
  }
  .comprow{
    display:flex;align-items:center;justify-content:space-between;
    font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);
    margin-bottom:12px;
  }
  .livechip{
    display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:3px 9px;letter-spacing:0.08em;
  }
  .livechip .pip{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .livechip.on{color:#fff;border-color:color-mix(in srgb,var(--brand) 55%, transparent)}
  .livechip.on .pip{background:var(--brand);animation:pulse 1.5s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(228,5,33,.55)}
    70%{box-shadow:0 0 0 8px rgba(228,5,33,0)}
    100%{box-shadow:0 0 0 0 rgba(228,5,33,0)}
  }

  .score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
  .kit{width:42px;height:40px;display:block}
  .kit .body{stroke:rgba(0,0,0,.35);stroke-width:1.2}
  .team.home .kit .body{fill:var(--brand)}
  .team.away .kit .body{fill:#ECEFF2}
  .kit .collar{fill:rgba(0,0,0,.18)}
  .tname{
    font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:-0.01em;
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;
  }
  .scoreline{
    font-family:var(--font-mono);font-weight:500;font-size:38px;letter-spacing:-0.02em;
    display:flex;align-items:center;gap:8px;line-height:1;
  }
  .scoreline .sep{color:var(--muted);font-size:26px}
  .scoreline .n{transition:transform .2s ease,color .2s ease}
  .scoreline .n.bump{transform:scale(1.35);color:var(--brand)}
  .clockrow{text-align:center;margin-top:10px;font-family:var(--font-mono);font-size:12px;color:var(--muted)}
  .phase{
    color:var(--text);border:1px solid var(--line);border-radius:999px;
    padding:1px 8px;margin-left:6px;font-size:11px;
  }

  /* Pitch */
  .pitchwrap{
    position:relative;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
    background:linear-gradient(180deg,var(--pitch),var(--pitch-2));
  }
  .pitchwrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 10%,rgba(0,0,0,.03) 10% 20%);
  }
  .pitch{display:block;width:100%;height:auto;aspect-ratio:100/64;position:relative}
  .pitch svg.lines{position:absolute;inset:0;width:100%;height:100%}
  .pitch svg.lines *{fill:none;stroke:var(--pitch-line);stroke-width:.5}
  .pitch svg.lines .spot{fill:var(--pitch-line);stroke:none}
  .pitch svg.lines .goal{stroke:#fff;stroke-width:1}

  .ball{
    position:absolute;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px;
    transition:left .65s cubic-bezier(.5,0,.3,1), top .65s cubic-bezier(.5,0,.3,1), transform .65s ease;
    z-index:3;will-change:left,top;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.45));
  }
  .ball.idle{animation:bob 2.4s ease-in-out infinite}
  .ball.shot{transform:scale(.82) rotate(220deg)}
  @keyframes bob{0%,100%{margin-top:-9px}50%{margin-top:-14px}}

  .flag{position:absolute;width:18px;height:22px;opacity:0;transform:translateY(4px) scale(.7);
    transition:opacity .18s ease, transform .18s ease;z-index:2}
  .flag.tl{left:3%;top:7%}
  .flag.bl{left:3%;top:93%;transform-origin:bottom}
  .flag.tr{left:97%;top:7%;margin-left:-18px}
  .flag.br{left:97%;top:93%;margin-left:-18px;transform-origin:bottom}
  .flag.show{opacity:1;transform:translateY(0) scale(1)}

  .pitchcard{
    position:absolute;top:10%;width:22px;height:30px;border-radius:3px;z-index:4;
    opacity:0;transform:scale(.6) rotate(-8deg);transition:opacity .18s ease, transform .18s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
  }
  .pitchcard.home{left:10%}
  .pitchcard.away{right:10%}
  .pitchcard.yellow{background:var(--yellow)}
  .pitchcard.red{background:var(--red)}
  .pitchcard.show{opacity:1;transform:scale(1) rotate(-8deg)}

  .flash{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;
    background:radial-gradient(80% 80% at 50% 50%, rgba(228,5,33,.5), transparent 70%)}
  .flash.go{animation:flash .9s ease}
  @keyframes flash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
  .goalword{
    position:absolute;inset:0;z-index:6;display:grid;place-items:center;pointer-events:none;
    font-family:var(--font-display);font-weight:800;font-size:34px;letter-spacing:0.06em;
    color:#fff;text-shadow:0 4px 18px rgba(0,0,0,.6);opacity:0;text-transform:uppercase;
  }
  .goalword.go{animation:goalword 1.1s cubic-bezier(.2,1.2,.4,1)}
  @keyframes goalword{0%{opacity:0;transform:scale(1.5)}25%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}

  /* Bottle watch */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
  .panel h2{
    margin:0 0 4px;font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:-0.01em;
    display:flex;align-items:center;gap:8px;
  }
  .panel h2 svg{width:16px;height:16px}
  .panel .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .favpick{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fav{
    appearance:none;border:1.5px solid var(--line);background:var(--surface-2);color:var(--text);
    border-radius:10px;padding:10px;font-family:var(--font-body);font-weight:600;font-size:13px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:border-color .12s ease, background .12s ease;white-space:nowrap;overflow:hidden;
  }
  .fav .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .fav.home .dot{background:var(--brand)}
  .fav.away .dot{background:#ECEFF2}
  .fav:hover{border-color:#3a4651}
  .fav.sel{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 14%, var(--surface-2))}
  .fav:focus-visible{outline:3px solid #5b8cff;outline-offset:2px}
  .bottlestatus{margin-top:12px;font-size:12.5px;color:var(--muted);min-height:18px;font-family:var(--font-mono)}
  .bottlestatus b{color:var(--text);font-weight:600}
  .bottlebanner{
    margin-top:12px;display:none;align-items:center;gap:10px;border-radius:10px;padding:11px 12px;
    background:color-mix(in srgb,var(--brand) 16%, var(--surface-2));
    border:1px solid color-mix(in srgb,var(--brand) 55%, transparent);
  }
  .bottlebanner.show{display:flex;animation:pop .35s ease}
  .bottlebanner svg{width:20px;height:20px;flex:none}
  .bottlebanner .txt{font-size:12.5px;font-weight:600}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

  /* Alert feed */
  .feedhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 0}
  .feedhead .t{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:0.02em}
  .feedhead .c{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
  .feedright{display:flex;align-items:center;gap:10px}
  .subbtn{
    appearance:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    border:1px solid color-mix(in srgb,var(--brand) 55%, transparent);background:transparent;
    color:var(--text);font-family:var(--font-body);font-weight:600;font-size:12px;
    border-radius:999px;padding:5px 11px;transition:background .12s ease, border-color .12s ease;
  }
  .subbtn svg{width:14px;height:14px}
  .subbtn:hover{background:color-mix(in srgb,var(--brand) 14%, transparent)}
  .subbtn.on{background:var(--brand);border-color:var(--brand);color:var(--brand-ink)}
  .subbtn:disabled{opacity:.55;cursor:default}
  .subbtn:focus-visible{outline:3px solid #5b8cff;outline-offset:2px}
  .feed{
    display:flex;flex-direction:column;gap:8px;border:1px solid var(--line);border-radius:var(--r);
    background:var(--surface);padding:10px;max-height:320px;overflow:auto;
  }
  .feed .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:18px 0}
  .alert{display:flex;align-items:center;gap:10px;animation:slidein .3s ease}
  @keyframes slidein{from{transform:translateY(-6px);opacity:0}to{transform:none;opacity:1}}
  .alert .ic{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;background:var(--surface-3)}
  .alert .ic svg{width:17px;height:17px;display:block}
  .alert.goal .ic{background:color-mix(in srgb,var(--brand) 22%, var(--surface-3))}
  .alert.bottle .ic{background:color-mix(in srgb,var(--brand) 26%, var(--surface-3))}
  .alert .body{min-width:0;flex:1}
  .alert .lab{font-size:13px;font-weight:600;line-height:1.25}
  .alert .meta{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
  .alert .min{
    font-family:var(--font-mono);font-size:12px;color:var(--text);background:var(--surface-3);
    border-radius:6px;padding:2px 7px;flex:none;
  }
  .card-rect{width:13px;height:17px;border-radius:2px}
  .card-rect.yellow{background:var(--yellow)}
  .card-rect.red{background:var(--red)}

  .credit{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);padding:2px 2px 0}
  .conn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono)}
  .conn .d{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .conn.live .d{background:var(--green)}

  .toast{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
    background:#fff;color:#13171c;font-size:13px;font-weight:600;
    padding:10px 16px;border-radius:999px;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:50;max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
  <main class="app">
    <header class="mast">
      <div class="wordmark">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#fff" stroke-width="2"/><path d="M12 6 L14.5 8 L13.5 11 L10.5 11 L9.5 8 Z" fill="#fff"/></svg>
        </span>
        <span>Pitch<span class="side">side</span></span>
      </div>
      <div class="tag">Live match companion</div>
    </header>

    <div class="modes" role="tablist" aria-label="Data mode">
      <button class="mode sel" data-mode="demo" role="tab">Demo</button>

      <button class="mode" data-mode="live" role="tab">Live</button>
    </div>

    <section class="matchcard" aria-label="Match">
      <div class="comprow">
        <span id="compName">World Cup</span>
        <span class="livechip" id="liveChip"><span class="pip"></span><span id="liveText">LIVE</span></span>
      </div>
      <div class="score">
        <div class="team home">
          <svg class="kit" viewBox="0 0 48 44" aria-hidden="true"><path class="body" d="M17 3 L7 8 L3 19 L11 23 L11 41 L37 41 L37 23 L45 19 L41 8 L31 3 L28 6 Q24 10 20 6 Z"/><path class="collar" d="M20 6 Q24 10 28 6 L31 3 L28 3 Q24 8 20 3 L17 3 Z"/></svg>
          <span class="tname" id="hName">Home</span>
        </div>
        <div class="scoreline">
          <span class="n" id="hScore">0</span><span class="sep">:</span><span class="n" id="aScore">0</span>
        </div>
        <div class="team away">
          <svg class="kit" viewBox="0 0 48 44" aria-hidden="true"><path class="body" d="M17 3 L7 8 L3 19 L11 23 L11 41 L37 41 L37 23 L45 19 L41 8 L31 3 L28 6 Q24 10 20 6 Z"/><path class="collar" d="M20 6 Q24 10 28 6 L31 3 L28 3 Q24 8 20 3 L17 3 Z"/></svg>
          <span class="tname" id="aName">Away</span>
        </div>

      <div class="clockrow"><span id="minute">0</span>'<span class="phase" id="phase">Not started</span></div>

    <div class="pitchwrap">

        <svg class="lines" viewBox="0 0 100 64" preserveAspectRatio="none" aria-hidden="true">
          <rect x="1" y="1" width="98" height="62" rx="1"/>
          <line x1="50" y1="1" x2="50" y2="63"/>
          <circle cx="50" cy="32" r="9"/>
          <circle class="spot" cx="50" cy="32" r="0.9"/>
          <rect x="1" y="16" width="16" height="32"/>
          <rect x="1" y="24" width="6" height="16"/>
          <rect x="83" y="16" width="16" height="32"/>
          <rect x="93" y="24" width="6" height="16"/>
          <circle class="spot" cx="11" cy="32" r="0.9"/>
          <circle class="spot" cx="89" cy="32" r="0.9"/>
          <path d="M17 26 A 7 7 0 0 1 17 38"/>
          <path d="M83 26 A 7 7 0 0 0 83 38"/>
          <line class="goal" x1="1" y1="28" x2="1" y2="36"/>
          <line class="goal" x1="99" y1="28" x2="99" y2="36"/>
        </svg>

        <div class="flag tl" id="flagTL" aria-hidden="true"></div>
        <div class="flag bl" id="flagBL" aria-hidden="true"></div>
        <div class="flag tr" id="flagTR" aria-hidden="true"></div>
        <div class="flag br" id="flagBR" aria-hidden="true"></div>

        <div class="pitchcard" id="pitchCard" aria-hidden="true"></div>

        <div class="ball idle" id="ball" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#fff" stroke="#0A0D10" stroke-width="1"/><path d="M12 6 L15 8.3 L13.8 12 L10.2 12 L9 8.3 Z" fill="#0A0D10"/><path d="M6.6 12.6 L9.2 14.4 L8 17.4 L5.4 16 Z" fill="#0A0D10"/><path d="M17.4 12.6 L18.6 16 L16 17.4 L14.8 14.4 Z" fill="#0A0D10"/></svg>
        </div>

        <div class="flash" id="flash" aria-hidden="true"></div>
        <div class="goalword" id="goalWord">Goal</div>
      </div>
    </div>

    <section class="panel" aria-label="Bottle watch">
      <h2>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 2 h4 v3 l1 2 v3 l2 4 v7 a1 1 0 0 1 -1 1 h-8 a1 1 0 0 1 -1 -1 v-7 l2 -4 v-3 l1 -2 Z" fill="none" stroke="var(--brand)" stroke-width="1.6" stroke-linejoin="round"/></svg>
        Bottle watch
      </h2>
      <div class="sub">Pick your team. If they lead and then blow it, you get an alert.</div>
      <div class="favpick" role="group" aria-label="Choose favourite team">
        <button class="fav home" id="favHome"><span class="dot"></span><span id="favHomeName">Home</span></button>
        <button class="fav away" id="favAway"><span class="dot"></span><span id="favAwayName">Away</span></button>
      </div>
      <div class="bottlestatus" id="bottleStatus">No team selected.</div>
      <div class="bottlebanner" id="bottleBanner">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L22 20 H2 Z" fill="none" stroke="var(--brand)" stroke-width="1.8" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="14" stroke="var(--brand)" stroke-width="1.8"/><circle cx="12" cy="17" r="1" fill="var(--brand)"/></svg>
        <span class="txt" id="bottleBannerText"></span>
      </div>
    </section>

    <div class="feedhead">
      <span class="t">Live alerts</span>
      <span class="feedright">
        <span class="c" id="feedCount">0 events</span>
        <button class="subbtn" id="subBtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 a6 6 0 0 0 -6 6 c0 5 -2 6 -2 6 h16 s-2 -1 -2 -6 a6 6 0 0 0 -6 -6 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M10 19 a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          <span id="subBtnText">Notify me</span>
        </button>
      </span>
    </div>
    <div class="feed" id="feed"><div class="empty">Goals, corners and cards will appear here as they happen.</div></div>

    <div class="credit">
      <span class="conn" id="conn"><span class="d"></span><span id="connText">Demo match</span></span>
      <span>Data by TxLINE</span>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
"use strict";

/* ----------------------------------------------------------------------------
   DATA ADAPTER
   Pitchside reads a normalised event bus. The demo feed runs a synthetic match
   so the page works offline. Replay and live consume the real TxLINE scores feed
   through the same-origin proxy. The bus, the demo feed, the SSE parser, and the
   replay/live adapters are the data layer and are kept intact: the only change
   is that the parser now also emits structured goal, corner, and card events
   (the stat encoding it reads is unchanged).

   TxLINE soccer stat encoding (from the feed docs):
     stat key = (period * 1000) + base_key
     base keys: 1/2 goals (P1/P2), 3/4 yellow, 5/6 red, 7/8 corners (P1/P2)
     game phase ids: 1 NS, 2 H1, 3 HT, 4 H2, 5 F ...
   Participant 1 = home, Participant 2 = away.
---------------------------------------------------------------------------- */

const PHASE = { 1:"Not started", 2:"1st half", 3:"Half time", 4:"2nd half", 5:"Full time" };

function makeEmitter(){
  const map = {};
  return {
    on(type, cb){ (map[type] = map[type] || []).push(cb); },
    emit(type, payload){ (map[type] || []).forEach(cb => cb(payload)); }
  };
}

/* --- Demo feed: a believable match the player drives one corner at a time --- */
function connectDemo(bus, fixture){
  let minute = 0, phase = 2, hScore = 0, aScore = 0;
  let corners = { home: 0, away: 0 };
  let momentum = 0; // negative favours home, positive favours away

  bus.emit("match", fixture);
  bus.emit("state", { minute, phase, hScore, aScore });

  // Ambient clock and the odd goal or card, so the match breathes while the
  // corner round waits for the player's pick.
  const clock = setInterval(() => {
    if (minute >= 90){ phase = 5; bus.emit("state",{minute,phase,hScore,aScore});
      bus.emit("tick",{ minute:"FT", text:"Full time. Tap New match to go again." });
      clearInterval(clock); return; }
    minute += 1;
    if (minute === 45){ phase = 3; }
    else if (minute === 46){ phase = 4; }
    else { phase = (minute < 45) ? 2 : 4; }

    // occasional goal
    if (Math.random() < 0.018){
      const home = Math.random() < 0.5;
      if (home){ hScore++; momentum -= 1; } else { aScore++; momentum += 1; }
      const team = home ? fixture.home.name : fixture.away.name;
      bus.emit("tick", { minute, text: "GOAL. " + team + " scores." });
    } else if (Math.random() < 0.012){
      const team = Math.random()<0.5 ? fixture.home.name : fixture.away.name;
      bus.emit("tick", { minute, text: "Yellow card, " + team + "." });
    }
    bus.emit("state", { minute, phase, hScore, aScore });
  }, 950);

  // The feed resolves a corner only after the player has locked a pick.
  // This keeps the round fair while the live clock keeps rolling.
  function deliverNextCorner(){
    const suspense = 1400 + Math.random()*2600;
    setTimeout(() => {
      if (phase === 5) return;
      // slight home edge, nudged by momentum
      const pAway = Math.min(0.72, Math.max(0.28, 0.46 + momentum*0.05));
      const away = Math.random() < pAway;
      if (away){ corners.away++; momentum += 0.4; } else { corners.home++; momentum -= 0.4; }
      bus.emit("corner", { side: away ? "away" : "home", minute, corners });
    }, suspense);
  }

  return { requestNextCorner: deliverNextCorner, stop(){ clearInterval(clock); } };
}

/* Both live and replay consume the same TxLINE score updates, so they share one
   parser. It maps the documented stat encoding into the internal events Pitchside
   reads, holding the last seen totals so a goal, card, or corner is detected only
   when its base count increases versus the previous value.

   stat key = (period * 1000) + base, so base = key % 1000.
     base 1/2 goals, 3/4 yellow, 5/6 red, 7/8 corners (home/away).
   Participant 1 is home, participant 2 is away.

   Confirmed against the real devnet feed: each update carries Stats as an object
   map keyed by the stat key with plain number values (not an array), and the
   top-level fields are PascalCase (Stats, GameState, Seq, Ts). The feed also
   carries per-period counters alongside the period 0 match total, but tracking
   the running max per side (below) lands on the match total either way. */
const REPLAY_DELAY = 700; // ms between historical updates, paced like a live feed

function makeScoreParser(fixture){
  const prev = { goalsH:0, goalsA:0, cornersH:0, cornersA:0, yelH:0, yelA:0, redH:0, redA:0 };
  let lastMinute = 0, logged = false;
  // Phase clock state, advanced from the feed as events stream through in order.
  // phase ids: 1 not started, 2 first half, 3 half time, 4 second half, 5 full
  // time. halfStartTs/halfBaseMin anchor the match minute to the current half so
  // the clock pauses across the interval instead of running on wall time.
  let phase = 1, startTime = null, halfStartTs = null, halfBaseMin = 0;

  // Yield [key, value] pairs from an update. The live and historical feeds send
  // Stats as an object map; older array shapes are still accepted as a fallback.
  function statEntries(upd){
    const map = upd.Stats ?? upd.stats ?? upd.statistics
      ?? (upd.data && (upd.data.Stats ?? upd.data.stats));
    const out = [];
    if (map && typeof map === "object" && !Array.isArray(map)){
      for (const k in map){
        const v = map[k];
        out.push([k, (v != null && typeof v === "object") ? (v.value ?? v.Value ?? v.v) : v]);
      }
      return out;
    }
    const arr = Array.isArray(map) ? map
      : Array.isArray(upd.scores) ? upd.scores
      : Array.isArray(upd.data) ? upd.data : [];
    for (const s of arr) out.push([s.key ?? s.statId ?? s.id ?? s.k, s.value ?? s.val ?? s.v]);
    return out;
  }
  // Map an explicit gameState (live feed) to a phase id. Numbers pass through;
  // strings are matched by token. A pre-match / not-started value returns null so
  // the Action timeline below drives the phase instead. The historical feed sends
  // GameState "scheduled" throughout, so in replay this is always null.
  function mapGameState(gs){
    if (gs == null) return null;
    if (typeof gs === "number") return gs;
    const s = String(gs).trim();
    if (s !== "" && !Number.isNaN(Number(s))) return Number(s);
    const t = s.toLowerCase().replace(/[^a-z]/g, "");
    if (/^(notstarted|scheduled|prematch|pregame|upcoming|standby)$/.test(t)) return null;
    if (/(firsthalf|1sthalf|1h|firstperiod)/.test(t)) return 2;
    if (/(halftime|interval|halfbreak|^ht$|^break$)/.test(t)) return 3;
    if (/(secondhalf|2ndhalf|2h|secondperiod)/.test(t)) return 4;
    if (/(fulltime|finished|ended|^final$|^ft$|complete)/.test(t)) return 5;
    if (/(extratime|overtime|^et$)/.test(t)) return 6;
    if (/(penalt|shootout)/.test(t)) return 7;
    return null;
  }

  // Advance the phase clock from this update. Prefer an explicit gameState; else
  // read the Action timeline (kickoff opens a half, halftime_finalised closes the
  // first half, game_finalised is full time). Mid-half kickoff restarts after a
  // stoppage are ignored because the phase is already in play.
  function advancePhase(upd, ts){
    const explicit = mapGameState(upd.gameState ?? upd.GameState ?? upd.phase);
    if (explicit != null){
      if (explicit === 4 && phase < 4 && ts != null){ halfStartTs = ts; halfBaseMin = 45; }
      else if (explicit === 2 && phase < 2 && ts != null){ halfStartTs = ts; halfBaseMin = 0; }
      phase = explicit;
      return;
    }
    const action = upd.Action ?? upd.action;
    if (action === "kickoff" || action === "kickoff_team"){
      if (phase <= 1){ phase = 2; halfStartTs = ts; halfBaseMin = 0; }
      else if (phase === 3){ phase = 4; halfStartTs = ts; halfBaseMin = 45; }
    } else if (action === "halftime_finalised"){
      phase = 3;
    } else if (action === "game_finalised"){
      phase = 5;
    }
  }

  // Match minute. An explicit clock field wins (live feed); otherwise derive it
  // from the timestamp relative to the current half, clamped so it reads 0 to 45
  // in the first half, holds at 45 through the interval, and 45 to 90 after.
  function deriveMinute(upd, ts){
    const m = upd.minute ?? upd.matchMinute ?? upd.min ?? upd.clock;
    if (typeof m === "number") return m;
    if (typeof m === "string"){ const n = parseInt(m, 10); if (!Number.isNaN(n)) return n; }
    let mins;
    if (halfStartTs != null && typeof ts === "number"){
      mins = halfBaseMin + Math.floor((ts - halfStartTs) / 60000);
    } else if (typeof ts === "number" && startTime != null){
      mins = Math.floor((ts - startTime) / 60000);
    } else {
      return lastMinute;
    }
    if (mins < 0) mins = 0;
    if (phase <= 2) mins = Math.min(mins, 45);
    else if (phase === 3) mins = 45;
    else if (phase === 4) mins = Math.min(Math.max(mins, 45), 90);
    else if (phase >= 5) mins = 90;
    return mins;
  }

  // Process one update: emit state plus structured goal, corner, and card events,
  // and return the sides whose corner total just increased (usually zero or one).
  return function process(upd, bus){
    if (!logged){ logged = true;
      console.log("[Touchline] first feed payload, confirm stat shape here:", upd); }

    if (startTime == null){
      const st = Number(upd.StartTime ?? upd.startTime);
      if (!Number.isNaN(st) && st > 0) startTime = st;
    }
    const ts = Number(upd.Ts ?? upd.ts);
    const tsVal = Number.isNaN(ts) ? null : ts;
    advancePhase(upd, tsVal);
    const minute = deriveMinute(upd, tsVal);
    let goalsH = prev.goalsH, goalsA = prev.goalsA;
    const corners = [];
    const cards = [];

    for (const [rawKey, rawVal] of statEntries(upd)){
      if (rawKey == null) continue;
      const value = Number(rawVal);
      if (Number.isNaN(value)) continue;
      switch (Number(rawKey) % 1000){            // strip the period multiplier
        // The feed carries per-period counters next to the period 0 match total,
        // so take the running max per stat (not the last value seen) to land on
        // the total. Goals, cards, and corners all accumulate, so the max is right.
        case 1: if (value > goalsH) goalsH = value; break;
        case 2: if (value > goalsA) goalsA = value; break;
        case 3: if (value > prev.yelH){ prev.yelH = value; cards.push({ side:"home", kind:"yellow" }); } break;
        case 4: if (value > prev.yelA){ prev.yelA = value; cards.push({ side:"away", kind:"yellow" }); } break;
        case 5: if (value > prev.redH){ prev.redH = value; cards.push({ side:"home", kind:"red" }); } break;
        case 6: if (value > prev.redA){ prev.redA = value; cards.push({ side:"away", kind:"red" }); } break;
        case 7: if (value > prev.cornersH){ prev.cornersH = value; corners.push("home"); } break;
        case 8: if (value > prev.cornersA){ prev.cornersA = value; corners.push("away"); } break;
      }
    }

    if (goalsH > prev.goalsH){
      bus.emit("tick", { minute, text: "GOAL. " + fixture.home.name + " scores." });
      bus.emit("goal", { side:"home", team: fixture.home.name, minute });
    }
    if (goalsA > prev.goalsA){
      bus.emit("tick", { minute, text: "GOAL. " + fixture.away.name + " scores." });
      bus.emit("goal", { side:"away", team: fixture.away.name, minute });
    }

    prev.goalsH = goalsH; prev.goalsA = goalsA;
    lastMinute = minute;

    for (const side of corners){
      bus.emit("corner", { side, team: side === "home" ? fixture.home.name : fixture.away.name, minute });
    }
    for (const c of cards){
      bus.emit("card", { side: c.side, kind: c.kind, team: c.side === "home" ? fixture.home.name : fixture.away.name, minute });
    }

    bus.emit("state", { minute, phase, hScore: goalsH, aScore: goalsA });
    return corners;
  };
}

/* --- Live feed: same-origin SSE relay through the proxy. The token lives only
   in the proxy, so no credentials are sent from the browser. The handle is
   returned synchronously while the stream loop runs in the background. --- */
function connectLive(bus, fixture, cfg){
  cfg = cfg || {};
  bus.emit("match", fixture);
  const process = makeScoreParser(fixture);
  let armed = false, stopped = false, reader = null;

  async function run(){
    const res = await fetch("/api/stream/scores", { headers: { "Accept": "text/event-stream" } });
    if (!res.ok) throw new Error("Stream failed: " + res.status);
    reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (!stopped){
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const raw of lines){
        const line = raw.trim();
        if (!line.startsWith("data:")) continue;
        let upd; try { upd = JSON.parse(line.slice(5).trim()); } catch { continue; }
        if (cfg.fixtureId != null && upd.fixtureId != null && String(upd.fixtureId) !== String(cfg.fixtureId)) continue;
        const corners = process(upd, bus);
        if (armed && corners.length){ armed = false; bus.emit("corner", { side: corners[0] }); }
      }
    }
  }
  run().catch(err => {
    console.error("[Touchline] live stream error:", err);
    bus.emit("tick", { minute: "!", text: "Live stream unavailable. Check the proxy and token." });
  });

  return {
    requestNextCorner(){ armed = true; },
    stop(){ stopped = true; try { reader && reader.cancel(); } catch(e){} }
  };
}

/* --- Replay display metadata. The historical score events carry participant ids
   but not names, so the real teams are pulled from the fixtures snapshot (same
   origin, through the proxy) to label the replay. Display only: nothing here
   reaches the score parser. --- */
async function fetchFixtureMeta(fixtureId){
  const res = await fetch("/api/fixtures/snapshot");
  if (!res.ok) throw new Error("snapshot " + res.status);
  const body = await res.json();
  const list = Array.isArray(body) ? body : (body.fixtures || body.data || []);
  const idOf = f => f.FixtureId ?? f.fixture_id ?? f.fixtureId ?? f.id;
  return list.find(f => String(idOf(f)) === String(fixtureId)) || null;
}

// Overlay the real fixture metadata onto the displayed fixture, in place, so the
// goal, corner, and card events (which read fixture names) also show real teams.
function applyFixtureMeta(fixture, meta){
  const p1 = meta.Participant1 ?? meta.participant1;
  const p2 = meta.Participant2 ?? meta.participant2;
  const p1Home = (meta.Participant1IsHome ?? meta.participant1_is_home) !== false;
  const homeName = p1Home ? p1 : p2;
  const awayName = p1Home ? p2 : p1;
  const comp = meta.Competition ?? meta.competition;
  if (homeName) fixture.home.name = homeName;
  if (awayName) fixture.away.name = awayName;
  if (comp) fixture.compName = comp;
  renderTeams(fixture);
}

function connectReplay(bus, fixture, cfg){
  cfg = cfg || {};
  bus.emit("match", fixture);
  const process = makeScoreParser(fixture);
  let armed = false, stopped = false, timer = null;

  async function run(){
    if (!cfg.fixtureId) throw new Error("replay needs a fixtureId");
    // Display only: label the replay with the real teams before the score events
    // start. Best effort, a failure leaves the placeholder shell.
    try {
      const meta = await fetchFixtureMeta(cfg.fixtureId);
      if (meta && !stopped) applyFixtureMeta(fixture, meta);
    } catch (e) { console.warn("[Touchline] fixture metadata unavailable:", e); }

    const res = await fetch("/api/scores/historical/" + encodeURIComponent(cfg.fixtureId));
    if (!res.ok) throw new Error("Historical failed: " + res.status);
    const body = await res.json();
    const updates = Array.isArray(body) ? body
      : (body.data || body.updates || body.scores || body.history || []);
    if (!Array.isArray(updates) || updates.length === 0) throw new Error("No history for fixture " + cfg.fixtureId);

    let i = 0;
    (function step(){
      if (stopped) return;
      if (i >= updates.length){ bus.emit("tick", { minute: "FT", text: "Replay finished. Tap New match." }); return; }
      const corners = process(updates[i++], bus);
      if (armed && corners.length){ armed = false; bus.emit("corner", { side: corners[0] }); }
      timer = setTimeout(step, REPLAY_DELAY);
    })();
  }
  run().catch(err => {
    console.error("[Touchline] replay error:", err);
    bus.emit("tick", { minute: "!", text: "Replay unavailable for this fixtureId." });
  });

  return {
    requestNextCorner(){ armed = true; },
    stop(){ stopped = true; clearTimeout(timer); }
  };
}

/* ----------------------------------------------------------------------------
   PITCHSIDE UI
   Subscribes to the bus and renders the header, the pitch reactions, the live
   alert feed, and the bottle watch. No game logic: it only reflects the feed.
---------------------------------------------------------------------------- */
const FIXTURES = [
  { compName:"World Cup", home:{name:"Brazil"}, away:{name:"Croatia"} },
  { compName:"World Cup", home:{name:"Mexico"}, away:{name:"Nigeria"} },
  { compName:"World Cup", home:{name:"Argentina"}, away:{name:"Japan"} },
  { compName:"World Cup", home:{name:"France"}, away:{name:"Morocco"} }
];

const $ = id => document.getElementById(id);
const els = {
  comp:$("compName"), liveChip:$("liveChip"), liveText:$("liveText"),
  hName:$("hName"), aName:$("aName"), hScore:$("hScore"), aScore:$("aScore"),
  minute:$("minute"), phase:$("phase"),
  pitch:$("pitch"), ball:$("ball"), flash:$("flash"), goalWord:$("goalWord"),
  flagTL:$("flagTL"), flagBL:$("flagBL"), flagTR:$("flagTR"), flagBR:$("flagBR"),
  pitchCard:$("pitchCard"),
  favHome:$("favHome"), favAway:$("favAway"), favHomeName:$("favHomeName"), favAwayName:$("favAwayName"),
  bottleStatus:$("bottleStatus"), bottleBanner:$("bottleBanner"), bottleBannerText:$("bottleBannerText"),
  feed:$("feed"), feedCount:$("feedCount"),
  subBtn:$("subBtn"), subBtnText:$("subBtnText"),
  conn:$("conn"), connText:$("connText"), toast:$("toast")
};

// SVG markup for alert icons. No emoji anywhere, icons only.
const ICONS = {
  ball: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fff" stroke="#0A0D10" stroke-width="1.2"/><path d="M12 6 L15 8.4 L13.8 12 L10.2 12 L9 8.4 Z" fill="#0A0D10"/></svg>',
  flag: '<svg viewBox="0 0 24 24"><line x1="6" y1="3" x2="6" y2="21" stroke="#fff" stroke-width="1.8"/><path d="M6 4 L18 7 L6 11 Z" fill="var(--brand)"/></svg>',
  bottle: '<svg viewBox="0 0 24 24"><path d="M12 3 L22 20 H2 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="14" stroke="#fff" stroke-width="1.8"/><circle cx="12" cy="17" r="1.1" fill="#fff"/></svg>',
  cardRect: kind => '<span class="card-rect ' + kind + '"></span>'
};

let game = null;

const MODE_LABEL = { demo:"Demo match", replay:"Replay", live:"Live" };
let currentMode = "demo";
let replayFixtureId = new URLSearchParams(location.search).get("fixtureId") || null;

function makeFeed(bus, fixture){
  els.conn.classList.toggle("live", currentMode === "live");
  els.connText.textContent = MODE_LABEL[currentMode];

  if (currentMode === "live"){
    return connectLive(bus, fixture, { fixtureId: replayFixtureId || fixture.fixtureId });
  }
  if (currentMode === "replay"){
    const id = replayFixtureId || fixture.fixtureId || promptFixtureId();
    if (!id){
      toast("Replay needs a fixtureId");
      currentMode = "demo"; syncModeButtons();
      els.conn.classList.remove("live"); els.connText.textContent = MODE_LABEL.demo;
      return connectDemo(bus, fixture);
    }
    return connectReplay(bus, fixture, { fixtureId: id });
  }
  return connectDemo(bus, fixture);
}

function promptFixtureId(){
  const id = window.prompt("Enter a TxLINE fixtureId to replay");
  if (id && id.trim()) replayFixtureId = id.trim();
  return replayFixtureId;
}

function syncModeButtons(){
  document.querySelectorAll(".mode").forEach(b => b.classList.toggle("sel", b.dataset.mode === currentMode));
}

// Paint team names and competition. Called on every match and on replay relabel.
function renderTeams(fixture){
  els.comp.textContent = fixture.compName;
  els.hName.textContent = fixture.home.name;
  els.aName.textContent = fixture.away.name;
  els.favHomeName.textContent = fixture.home.name;
  els.favAwayName.textContent = fixture.away.name;
}

function startMatch(fixture){
  if (game && game.feed) game.feed.stop();

  game = {
    fixture,
    bus: makeEmitter(),
    feed: null,
    mode: currentMode,
    hScore: 0, aScore: 0,
    fav: game ? game.fav : null,           // keep the favourite across matches
    bottle: { wasLeading:false, bottled:false },
    count: 0
  };

  renderTeams(fixture);
  setScore(0, 0);
  setClock(0, 1);
  clearFeed();
  resetPitch();
  syncFavButtons();
  els.bottleBanner.classList.remove("show");
  updateBottleStatus();

  const bus = game.bus;
  bus.on("match", f => renderTeams(f));
  bus.on("state", onState);
  wireEvents(bus, fixture, currentMode);

  game.feed = makeFeed(bus, fixture);

  // In demo the corners are synthetic and only arrive when requested, so prime
  // the pump. Replay and live emit corners straight from the parser.
  if (currentMode === "demo" && game.feed) game.feed.requestNextCorner();
}

// Translate feed signals into unified goal, corner, and card handlers. Replay and
// live get structured events from the parser; demo emits goals and cards as ticker
// text, so they are read from the score deltas and the tick text instead.
function wireEvents(bus, fixture, mode){
  // Capture this match so stray events from a stopped feed (after a mode switch)
  // are ignored once a new match has started.
  const myGame = game;
  if (mode === "demo"){
    let h = 0, a = 0;
    bus.on("state", s => {
      if (game !== myGame) return;
      if (s.hScore > h){ h = s.hScore; onGoal("home", s.minute); }
      if (s.aScore > a){ a = s.aScore; onGoal("away", s.minute); }
    });
    bus.on("tick", t => {
      if (game !== myGame) return;
      const kind = /red card/i.test(t.text) ? "red" : /yellow card/i.test(t.text) ? "yellow" : null;
      if (kind) onCard(sideFromText(t.text), kind, t.minute);
    });
  } else {
    bus.on("goal", g => { if (game === myGame) onGoal(g.side, g.minute); });
    bus.on("card", c => { if (game === myGame) onCard(c.side, c.kind, c.minute); });
  }
  bus.on("corner", c => {
    if (game !== myGame) return;
    onCorner(c.side, c.minute);
    if (mode === "demo" && game.feed){
      setTimeout(() => { if (game === myGame && game.feed) game.feed.requestNextCorner(); }, 1400);
    }
  });
}

function sideFromText(text){
  const t = (text || "").toLowerCase();
  if (game.fixture.away.name && t.includes(game.fixture.away.name.toLowerCase())) return "away";
  return "home";
}

function teamName(side){ return side === "home" ? game.fixture.home.name : game.fixture.away.name; }

/* --- Scoreboard --- */
function setScore(h, a){
  if (String(h) !== els.hScore.textContent) bumpScore(els.hScore);
  if (String(a) !== els.aScore.textContent) bumpScore(els.aScore);
  els.hScore.textContent = h;
  els.aScore.textContent = a;
  game.hScore = h; game.aScore = a;
}
function bumpScore(el){
  el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
  setTimeout(() => el.classList.remove("bump"), 260);
}
function setClock(minute, phase){
  els.minute.textContent = (phase === 5) ? "90" : minute;
  els.phase.textContent = PHASE[phase] || "Live";
  const inPlay = (phase === 2 || phase === 4);
  els.liveChip.classList.toggle("on", inPlay);
  els.liveText.textContent = inPlay ? "LIVE" : (PHASE[phase] || "LIVE").toUpperCase();
}
function onState(s){
  setScore(s.hScore, s.aScore);
  setClock(s.minute, s.phase);
  evaluateBottle(s.hScore, s.aScore, s.minute);
}

/* --- Pitch reactions --- */
function resetPitch(){
  els.ball.classList.add("idle");
  els.ball.style.left = "50%"; els.ball.style.top = "50%";
  [els.flagTL, els.flagBL, els.flagTR, els.flagBR].forEach(f => f.classList.remove("show"));
  els.pitchCard.classList.remove("show");
  els.flash.classList.remove("go");
  els.goalWord.classList.remove("go");
}

// Home attacks the right goal, away attacks the left goal.
function onGoal(side, minute){
  els.ball.classList.remove("idle");
  const toRight = (side === "home");
  els.ball.style.left = toRight ? "97%" : "3%";
  els.ball.style.top = "50%";
  els.ball.classList.add("shot");

  els.flash.classList.remove("go"); void els.flash.offsetWidth; els.flash.classList.add("go");
  els.goalWord.textContent = "Goal";
  els.goalWord.classList.remove("go"); void els.goalWord.offsetWidth; els.goalWord.classList.add("go");

  setTimeout(() => {
    els.ball.classList.remove("shot");
    els.ball.style.left = "50%"; els.ball.style.top = "50%";
    setTimeout(() => els.ball.classList.add("idle"), 650);
  }, 1100);

  addAlert("goal", minute, "Goal", teamName(side), side);
}

function onCorner(side, minute){
  // Home attacks the right, so a home corner lights the right side flags.
  const flags = (side === "home") ? [els.flagTR, els.flagBR] : [els.flagTL, els.flagBL];
  flags.forEach(f => { f.innerHTML = ICONS.flag; f.classList.add("show"); });
  setTimeout(() => flags.forEach(f => f.classList.remove("show")), 1600);
  addAlert("corner", minute, "Corner", teamName(side), side);
}

function onCard(side, kind, minute){
  els.pitchCard.className = "pitchcard " + side + " " + kind;
  void els.pitchCard.offsetWidth; els.pitchCard.classList.add("show");
  setTimeout(() => els.pitchCard.classList.remove("show"), 1600);
  const label = (kind === "red" ? "Red card" : "Yellow card");
  addAlert("card", minute, label, teamName(side), side, kind);
}

/* --- Live alert feed --- */
function clearFeed(){
  game.count = 0;
  els.feed.innerHTML = '<div class="empty">Goals, corners and cards will appear here as they happen.</div>';
  els.feedCount.textContent = "0 events";
}
function fmtMinute(m){
  if (m == null || m === "") return "";
  if (typeof m === "number") return m + "'";
  if (/^\d+$/.test(String(m))) return m + "'";
  return String(m);
}
function addAlert(type, minute, label, team, side, kind){
  const empty = els.feed.querySelector(".empty");
  if (empty) empty.remove();

  const row = document.createElement("div");
  row.className = "alert " + type;

  let icon;
  if (type === "goal") icon = ICONS.ball;
  else if (type === "corner") icon = ICONS.flag;
  else if (type === "bottle") icon = ICONS.bottle;
  else icon = ICONS.cardRect(kind || "yellow");

  row.innerHTML =
    '<span class="ic">' + icon + '</span>' +
    '<span class="body"><span class="lab">' + label + '</span>' +
    '<span class="meta">' + (team || "") + '</span></span>' +
    '<span class="min">' + fmtMinute(minute) + '</span>';

  els.feed.insertBefore(row, els.feed.firstChild);
  while (els.feed.children.length > 40) els.feed.removeChild(els.feed.lastChild);

  game.count += 1;
  els.feedCount.textContent = game.count + (game.count === 1 ? " event" : " events");
}

/* --- Bottle watch --- */
function selectFav(side){
  game.fav = side;
  game.bottle = { wasLeading:false, bottled:false };
  els.bottleBanner.classList.remove("show");
  syncFavButtons();
  // Seed the lead state from the current score so an existing lead counts.
  evaluateBottle(game.hScore, game.aScore, null, true);
  updateBottleStatus();
  // Keep any push subscription pointed at the new favourite for bottle alerts.
  if (pushState.sub) postSubscription(pushState.sub).catch(() => {});
}
function syncFavButtons(){
  els.favHome.classList.toggle("sel", game.fav === "home");
  els.favAway.classList.toggle("sel", game.fav === "away");
}
function favDiff(h, a){
  if (!game.fav) return 0;
  const favScore = game.fav === "home" ? h : a;
  const oppScore = game.fav === "home" ? a : h;
  return favScore - oppScore;
}
function evaluateBottle(h, a, minute, silent){
  if (!game.fav) return;
  const diff = favDiff(h, a);
  if (diff >= 1){
    game.bottle.wasLeading = true;
    game.bottle.bottled = false;
  } else if (game.bottle.wasLeading && diff <= 0 && !game.bottle.bottled){
    game.bottle.bottled = true;
    if (!silent) raiseBottle(minute, diff);
  }
  updateBottleStatus(diff);
}
function raiseBottle(minute, diff){
  const team = teamName(game.fav);
  const how = diff === 0 ? "are being pegged back to a draw" : "have surrendered the lead";
  const text = team + " " + how + ".";
  els.bottleBannerText.textContent = "Bottle alert: " + text;
  els.bottleBanner.classList.remove("show"); void els.bottleBanner.offsetWidth;
  els.bottleBanner.classList.add("show");
  addAlert("bottle", minute, "Bottle alert", text, game.fav);
  toast("Bottle alert: " + team);
}
function updateBottleStatus(diff){
  if (!game.fav){ els.bottleStatus.textContent = "No team selected."; return; }
  const team = teamName(game.fav);
  const d = (diff == null) ? favDiff(game.hScore, game.aScore) : diff;
  let state;
  if (game.bottle.bottled) state = "lead surrendered";
  else if (d >= 1) state = "leading by " + d;
  else if (d === 0) state = "level";
  else state = "trailing by " + (-d);
  els.bottleStatus.innerHTML = "Watching <b>" + team + "</b>, " + state + ".";
}

function toast(msg){
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  setTimeout(() => els.toast.classList.remove("show"), 2200);
}

/* events */
els.favHome.addEventListener("click", () => selectFav("home"));
els.favAway.addEventListener("click", () => selectFav("away"));
document.querySelectorAll(".mode").forEach(btn => {
  btn.addEventListener("click", () => {
    if (btn.dataset.mode === currentMode) return;
    currentMode = btn.dataset.mode;
    syncModeButtons();
    startMatch(game.fixture);
  });
});

/* ----------------------------------------------------------------------------
   PWA AND WEB PUSH
   Registers a service worker and lets the fan subscribe to push alerts, so goals,
   corners, cards, and bottle moments arrive even with the tab closed. The VAPID
   public key and the subscription store both live in the proxy.
---------------------------------------------------------------------------- */
const pushState = { reg:null, sub:null };

function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

// Convert a base64url VAPID key into the Uint8Array applicationServerKey wants.
function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

function currentFixtureId(){
  return replayFixtureId || (game && game.fixture && game.fixture.fixtureId) || "";
}

function subscriptionBody(sub){
  return {
    subscription: sub.toJSON(),
    fav: (game && game.fav) || "",
    fixtureId: currentFixtureId() || "",
    teams: { home: game.fixture.home.name, away: game.fixture.away.name }
  };
}

async function postSubscription(sub){
  await fetch("/api/push/subscribe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(subscriptionBody(sub))
  });
}

async function registerServiceWorker(){
  if (!pushSupported()){ els.subBtn.disabled = true; els.subBtnText.textContent = "No push"; return; }
  try {
    pushState.reg = await navigator.serviceWorker.register("/sw.js");
    pushState.sub = await pushState.reg.pushManager.getSubscription();
    syncSubButton();
  } catch (e){ console.warn("[Pitchside] service worker registration failed:", e); }
}

async function subscribeToPush(){
  if (!pushSupported()){ toast("Push is not supported here"); return; }
  if (pushState.sub){ toast("Alerts already on"); return; }
  els.subBtn.disabled = true;
  try {
    if (!pushState.reg) await registerServiceWorker();
    const perm = await Notification.requestPermission();
    if (perm !== "granted"){ toast("Notifications blocked"); return; }
    const key = (await (await fetch("/api/push/vapidPublicKey")).text()).trim();
    if (!key){ toast("Push not configured on the server"); return; }
    pushState.sub = await pushState.reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key)
    });
    await postSubscription(pushState.sub);
    syncSubButton();
    toast("Alerts on. You can close the tab.");
  } catch (e){
    console.error("[Pitchside] push subscribe failed:", e);
    toast("Could not enable alerts");
  } finally {
    els.subBtn.disabled = false;
  }
}

function syncSubButton(){
  const on = !!pushState.sub;
  els.subBtnText.textContent = on ? "Alerts on" : "Notify me";
  els.subBtn.classList.toggle("on", on);
}

els.subBtn.addEventListener("click", subscribeToPush);

/* boot */
syncModeButtons();
startMatch(FIXTURES[0]);
registerServiceWorker();
</script>
</body>
